name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifact
          cp build/bin/brimir_libretro.dll artifact/
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-windows-x64
          path: artifact/

  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(nproc)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.so" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-linux-x64
          path: artifact/

  build-linux-arm64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM64 cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            gcc-14-aarch64-linux-gnu g++-14-aarch64-linux-gnu

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc-14 \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++-14 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(nproc)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.so" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-linux-arm64
          path: artifact/

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(sysctl -n hw.ncpu)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.*" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-macos-arm64
          path: artifact/

  release:
    needs: [build-windows, build-linux-x64, build-linux-arm64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-windows-x64
          path: windows-x64

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-linux-x64
          path: linux-x64

      - name: Download Linux ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-linux-arm64
          path: linux-arm64

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-macos-arm64
          path: macos-arm64

      - name: Package releases
        run: |
          cd windows-x64 && zip -r ../brimir-${{ github.ref_name }}-windows-x64.zip . && cd ..
          cd linux-x64 && tar czf ../brimir-${{ github.ref_name }}-linux-x64.tar.gz . && cd ..
          cd linux-arm64 && tar czf ../brimir-${{ github.ref_name }}-linux-arm64.tar.gz . && cd ..
          cd macos-arm64 && tar czf ../brimir-${{ github.ref_name }}-macos-arm64.tar.gz . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            brimir-${{ github.ref_name }}-windows-x64.zip
            brimir-${{ github.ref_name }}-linux-x64.tar.gz
            brimir-${{ github.ref_name }}-linux-arm64.tar.gz
            brimir-${{ github.ref_name }}-macos-arm64.tar.gz
          body: |
            Brimir is a Sega Saturn emulation core for libretro, built on Ymir's cycle-accurate hardware layer.

            ### v0.4.6

            **Ymir Hardware Layer Refresh (through 2026-07-17)** — targeted upstream bug fixes and optimizations backported on top of the 2026-06-23 sync

            **Added**
            - **SMPC per-region persistent storage** — RTC/backup data is now saved per Saturn region, using region-qualified filenames (`brimir_saturn_rtc_<region>.smpc`). The legacy single-region file is automatically migrated.
            - **Region-free IPL database** — IPL ROM info is now keyed by BIOS image content rather than a fixed Japanese-only lookup, enabling first-class US/EU/Asia BIOS support.
            - **Europe PAL / Asia NTSC default regions** — automatic default region selection for European and Asian BIOS variants.
            - **Libretro integration hardening** — SRAM managed as the canonical `.srm` buffer, core options apply live from the Quick Menu, real NTSC/PAL region drives AV timing, and save states are versioned with legacy compatibility.

            **Changed**
            - **SH2** — interrupt flag register micro-optimizations backported from upstream Ymir.
            - **VDP2** — sprite layer attribute reference cached per command, reducing redundant lookups.
            - **Game DB** — compatibility/hack entries updated for 3D Baseball, Resident Evil, Dino Island, and others.
            - **CD/Media** — non-ASCII CHD filename crash fix, ISO path-table size guard, and CUE track-length/null-byte guards.
            - **Input** — Virtua Gun jitter support for Death Crimson.
            - Saturn-native maximum geometry reported to libretro (704×512).
            - Performance profiling is now gated behind the `brimir_profiling` core option.

            **Fixed**
            - Cross-game SRAM contamination when a stale in-memory buffer was copied into a newly loaded title's backup RAM.
            - Non-portable `bool` serialization in per-region SMPC RTC save files.

            **Save state compatibility note** — States are now versioned with a `BRI2` header and can still load legacy `BRIM` states. SMPC persistent data is stored inside the state payload.

            See [CHANGELOG.md](https://github.com/coredds/brimir/blob/master/CHANGELOG.md) for full details.
