name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifact
          cp build/bin/brimir_libretro.dll artifact/
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-windows-x64
          path: artifact/

  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(nproc)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.so" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-linux-x64
          path: artifact/

  build-linux-arm64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM64 cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            gcc-14-aarch64-linux-gnu g++-14-aarch64-linux-gnu

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc-14 \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++-14 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(nproc)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.so" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-linux-arm64
          path: artifact/

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(sysctl -n hw.ncpu)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.*" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-macos-arm64
          path: artifact/

  release:
    needs: [build-windows, build-linux-x64, build-linux-arm64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-windows-x64
          path: windows-x64

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-linux-x64
          path: linux-x64

      - name: Download Linux ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-linux-arm64
          path: linux-arm64

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-macos-arm64
          path: macos-arm64

      - name: Package releases
        run: |
          cd windows-x64 && zip -r ../brimir-${{ github.ref_name }}-windows-x64.zip . && cd ..
          cd linux-x64 && tar czf ../brimir-${{ github.ref_name }}-linux-x64.tar.gz . && cd ..
          cd linux-arm64 && tar czf ../brimir-${{ github.ref_name }}-linux-arm64.tar.gz . && cd ..
          cd macos-arm64 && tar czf ../brimir-${{ github.ref_name }}-macos-arm64.tar.gz . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            brimir-${{ github.ref_name }}-windows-x64.zip
            brimir-${{ github.ref_name }}-linux-x64.tar.gz
            brimir-${{ github.ref_name }}-linux-arm64.tar.gz
            brimir-${{ github.ref_name }}-macos-arm64.tar.gz
          body: |
            Brimir is a Sega Saturn emulation core for libretro, built on Ymir's cycle-accurate hardware layer.

            ### v0.4.5

            **Ymir Hardware Layer Fixes (through 2026-06-26)** — 7 targeted upstream bug fixes backported on top of the 2026-06-23 sync

            **SMPC** — Update peripheral PDR1/PDR2 registers when reading and when updating EXLE; fixes many cases of games not recognizing Virtua Gun inputs or missing shots

            **Input** — 3D Control Pad digital-mode report now matches the Standard Pad (fixes Bug Too!, Black/Matrix); analog-mode report LSBs set to all ones (fixes double inputs in Deep Fear)

            **VDP1** — Textured sprites with CMDSIZE.H=0 now fetch texels correctly (fixes glitched graphics in Policenauts); FBRAM no longer synced on debug reads (fixes a memory-viewer deadlock)

            **VDP2** — Color calculations correctly restricted in Hi-Res/exclusive-monitor modes with color RAM modes other than 0 (fixes Dark Savior Sound Test text); VCNT/external-latch coordinate handling overhauled (fixes several Virtua Gun shot-offset/reload errors and Digital Dance Mix Vol. 1 camera angles)

            **CD Block (HLE)** — Squashed fix chain for Play/Pause/Seek/TOC/Init command handling — fixes music looping/restart and freeze issues in Mass Destruction, Mahjong Yon Shimai, Shellshock, Sonic Jam, and IRREEL, plus Seek Disc edge cases

            **Save state compatibility note** — this release removes an unused field from the save state layout; existing save states will need to be recreated after upgrading

            See [CHANGELOG.md](https://github.com/coredds/brimir/blob/master/CHANGELOG.md) for full details.
