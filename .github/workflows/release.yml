name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifact
          cp build/bin/brimir_libretro.dll artifact/
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-windows-x64
          path: artifact/

  build-linux-x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(nproc)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.so" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-linux-x64
          path: artifact/

  build-linux-arm64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM64 cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            gcc-14-aarch64-linux-gnu g++-14-aarch64-linux-gnu

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc-14 \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++-14 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(nproc)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.so" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-linux-arm64
          path: artifact/

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBRIMIR_LTO=ON

      - name: Build
        run: cmake --build build --config Release --target brimir_libretro --parallel $(sysctl -n hw.ncpu)

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          find build -name "brimir_libretro.*" -exec cp {} artifact/ \;
          cp resources/info/brimir_libretro.info artifact/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brimir-macos-arm64
          path: artifact/

  release:
    needs: [build-windows, build-linux-x64, build-linux-arm64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-windows-x64
          path: windows-x64

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-linux-x64
          path: linux-x64

      - name: Download Linux ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-linux-arm64
          path: linux-arm64

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: brimir-macos-arm64
          path: macos-arm64

      - name: Package releases
        run: |
          cd windows-x64 && zip -r ../brimir-${{ github.ref_name }}-windows-x64.zip . && cd ..
          cd linux-x64 && tar czf ../brimir-${{ github.ref_name }}-linux-x64.tar.gz . && cd ..
          cd linux-arm64 && tar czf ../brimir-${{ github.ref_name }}-linux-arm64.tar.gz . && cd ..
          cd macos-arm64 && tar czf ../brimir-${{ github.ref_name }}-macos-arm64.tar.gz . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            brimir-${{ github.ref_name }}-windows-x64.zip
            brimir-${{ github.ref_name }}-linux-x64.tar.gz
            brimir-${{ github.ref_name }}-linux-arm64.tar.gz
            brimir-${{ github.ref_name }}-macos-arm64.tar.gz
          body: |
            Brimir is a Sega Saturn emulation core for libretro, built on Ymir's cycle-accurate hardware layer.

            ### v0.4.9

            **Fixed**
            - **SRAM save persistence** — the `.srm` buffer is now copied into Ymir's backup RAM on the first emulation frame instead of during the first `GetSRAMData()` call. Previously the copy happened before the frontend had loaded the `.srm`, causing the game to see an empty/formatted backup RAM and eventually overwriting the real save file.
            - **SRAM buffer discarded on unload** — `UnloadGame()` no longer clears the in-memory SRAM buffer so the frontend can read the final state for `.srm` serialization after closing content.
            - **Save-state trailing bytes** — the `BRI2` save-state header now stores the compressed payload size. Frontends that allocate larger buffers than required can no longer cause `LoadState` to misdecode trailing bytes as LZ4 data.

            **Added**
            - **Threaded VDP core options** — new `brimir_threaded_vdp1` and `brimir_threaded_vdp2` options (default ON) allow toggling threaded rendering for stability testing or debugging save-state race conditions.

            **Changed**
            - **libretro API serialization** — all core API calls that inspect or mutate running state (`retro_run`, serialize/unserialize, reset, load/unload, and disk-control callbacks) now share a recursive mutex, making the core safe against frontends that dispatch these concurrently.
            - **Save-state format** — `BRI2` header version bumped to 2 (16 bytes: magic, version, uncompressed size, compressed size). Version 1 states still load, but raw/unknown-magic buffers are now rejected to avoid layout mismatch heap corruption.

            See [CHANGELOG.md](https://github.com/coredds/brimir/blob/master/CHANGELOG.md) for full details.
